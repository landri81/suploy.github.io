<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{user-select:none;-webkit-user-select:none;}
:root{
  --navy:#0F1B2D;--accent:#1A5CFF;--al:#EEF3FF;
  --stone:#F4F2EE;--border:#E5E2DB;--muted:#6B6B6B;
  --green:#16A34A;--gl:#EDFAF3;--red:#DC2626;--rl:#FEF2F2;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Instrument Sans','Helvetica Neue',sans-serif;
}
body{font-family:var(--sans);}
a{text-decoration:none;color:inherit;}
.nav-item{font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:color .2s;}
.nav-item:hover{color:var(--navy);}
.btn-main{background:var(--navy);color:#fff;padding:12px 26px;font-family:var(--sans);font-size:14px;font-weight:600;border:none;border-radius:5px;cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap;}
.btn-main:hover{background:#162442;transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--navy);padding:12px 26px;font-family:var(--sans);font-size:14px;font-weight:500;border:1.5px solid var(--border);border-radius:5px;cursor:pointer;transition:border-color .2s,background .2s;white-space:nowrap;}
.btn-outline:hover{border-color:#C0BBB2;background:#F7F5F1;}
.btn-primary{background:var(--navy);color:#fff;padding:10px 22px;border:none;border-radius:5px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:7px;}
.btn-primary:hover{background:#162442;}
.btn-accent{background:var(--accent);color:#fff;padding:10px 22px;border:none;border-radius:5px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;}
.btn-accent:hover{background:#1451e8;}
.btn-ghost{background:transparent;color:var(--navy);padding:9px 18px;border:1.5px solid var(--border);border-radius:5px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:#c0bbb2;background:var(--stone);}
.match-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;transition:all .4s ease;gap:12px;}
.match-row.lit{border-color:var(--accent);background:#F5F8FF;box-shadow:0 0 0 3px rgba(26,92,255,.07);}
.step-card{padding:36px 32px;background:#fff;border:1px solid var(--border);border-radius:8px;transition:box-shadow .25s,transform .25s;}
.step-card:hover{box-shadow:0 12px 40px rgba(15,27,45,.07);transform:translateY(-3px);}
.plan-card{padding:36px 30px;border-radius:10px;border:1.5px solid var(--border);background:#fff;display:flex;flex-direction:column;transition:box-shadow .25s;}
.plan-card:hover{box-shadow:0 16px 48px rgba(15,27,45,.09);}
.plan-card.featured{background:var(--navy);border-color:var(--navy);color:#fff;transform:translateY(-8px);box-shadow:0 24px 64px rgba(15,27,45,.22);}
.sector-chip{padding:7px 16px;background:#fff;border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:500;color:#333;cursor:default;transition:all .2s;display:inline-block;}
.sector-chip:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.input{width:100%;padding:11px 14px;font-family:var(--sans);font-size:14px;color:var(--navy);background:#fff;border:1.5px solid var(--border);border-radius:6px;outline:none;transition:border-color .2s,box-shadow .2s;user-select:text;-webkit-user-select:text;}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,92,255,.09);}
.input.err{border-color:var(--red);}
.pill{padding:9px 18px;border-radius:100px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:#444;cursor:pointer;transition:all .18s;user-select:none;white-space:nowrap;}
.pill:hover{border-color:#b0aaa0;background:var(--stone);}
.pill.sel{border-color:var(--accent);background:var(--al);color:var(--accent);font-weight:600;}
.need-card{padding:20px 22px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .18s;display:flex;align-items:flex-start;gap:14px;}
.need-card:hover{border-color:#c0bbb2;box-shadow:0 4px 16px rgba(15,27,45,.06);}
.need-card.sel{border-color:var(--accent);background:var(--al);box-shadow:0 0 0 3px rgba(26,92,255,.08);}
.check-box{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
.check-box.checked{background:var(--accent);border-color:var(--accent);}
.sidebar-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:7px;cursor:pointer;transition:all .18s;font-size:14px;font-weight:500;color:var(--muted);}
.sidebar-item:hover{background:var(--stone);color:var(--navy);}
.sidebar-item.act{background:var(--al);color:var(--accent);font-weight:600;}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;}
.trow{display:grid;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;}
.trow:last-child{border-bottom:none;}
.trow:hover{background:#FAFAF8;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg{background:var(--gl);color:var(--green);}
.bb{background:var(--al);color:var(--accent);}
.bs{background:var(--stone);color:var(--muted);}
.br{background:var(--rl);color:var(--red);}
.bo{background:#FFF7ED;color:#C2410C;}
.tab{padding:9px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;border:none;background:transparent;font-family:var(--sans);color:var(--muted);}
.tab.act{background:var(--al);color:var(--accent);font-weight:600;}
.tab:hover:not(.act){background:var(--stone);color:var(--navy);}
.msg-row{display:flex;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.msg-row:hover{background:#FAFAF8;}
.modal-bg{position:fixed;inset:0;background:rgba(15,27,45,.55);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px);}
.modal-box{background:#fff;border-radius:12px;max-width:720px;width:100%;box-shadow:0 24px 80px rgba(15,27,45,.2);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
